<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Operativos - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .table-container { background: white; border-radius: 8px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5 fw-bold text-dark">Dashboard de Monitoreo Híbrido</h1>
        
        <div class="row g-4 text-center">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <button onclick="fetchExternal()" class="btn btn-primary btn-lg w-100 mb-3 shadow">
                        Consultar Clima en Manizales (API Externa)
                    </button>
                    <div id="weather-result" class="alert alert-info d-none fw-bold fs-5"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <button onclick="fetchCloud()" class="btn btn-success btn-lg w-100 mb-3 shadow">
                        Ver Últimos Datos de la Nube
                    </button>
                    <div id="cloud-result" class="mt-2 d-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchExternal() {
            try {
                const res = await fetch('/api-externa');
                const data = await res.json();
                const weatherDiv = document.getElementById('weather-result');
                
                weatherDiv.classList.remove('d-none');
                weatherDiv.innerHTML = `🌤️ Temp. Actual: <span class="text-primary">${data.current_weather.temperature}°C</span>`;
            } catch (error) {
                console.error("Error Clima:", error);
            }
        }

        // Función para procesar y mostrar los datos de la nube en formato tabla
        async function fetchCloud() {
            try {
                const res = await fetch('/datos-nube');
                const response = await res.json();
                
                const data = Array.isArray(response) ? response : response.data;
                const cloudDiv = document.getElementById('cloud-result');
                
                cloudDiv.classList.remove('d-none');

                if (!data || data.length === 0) {
                    cloudDiv.innerHTML = '<div class="alert alert-warning">No hay datos disponibles.</div>';
                    return;
                }

                let html = `
                    <div class="table-responsive table-container shadow-sm border">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Sensor</th>
                                    <th>Valor</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                data.forEach(item => {
                    const fecha = new Date(item.timestamp).toLocaleString();
                    
                    const badgeClass = item.tipo === 'CPU_Temp' ? 'bg-danger' : 'bg-primary';

                    html += `
                        <tr>
                            <td>${item.id}</td>
                            <td><span class="badge ${badgeClass}">${item.tipo}</span></td>
                            <td><span class="fw-bold text-dark">${item.valor}</span></td>
                            <td><small class="text-muted">${fecha}</small></td>
                        </tr>
                    `;
                });

                html += `</tbody></table></div>`;
                cloudDiv.innerHTML = html;

            } catch (error) {
                console.error("Error Nube:", error);
                document.getElementById('cloud-result').innerHTML = 
                    `<div class="alert alert-danger">Error conectando con la nube.</div>`;
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
